name: Update market JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"   # UTC 기준, 15분마다

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests feedparser yfinance

      - name: Generate JSON
        run: |
          python scripts/fetch_data.py
        env:
          NEWS_RSS_URL: ${{ secrets.NEWS_RSS_URL }}

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "Update market data"
          git push
